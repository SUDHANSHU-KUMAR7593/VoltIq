<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <title>
    Order Success — VOLTIQ
  </title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="css/style.css"
  />
</head>

<body>

  <div id="navbar"></div>

  <section class="section">

    <div class="container-xxl">

      <div
        class="mx-auto text-center"
        style="max-width:700px;"
      >

        <div
          style="
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(180,255,57,.12);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
          "
        >

          <i
            class="bi bi-check-lg"
            style="
              font-size: 3rem;
              color: var(--lime);
            "
          ></i>

        </div>

        <h1
          style="
            font-size:
            clamp(2.5rem,5vw,4rem);
          "
        >

          Order Placed!

        </h1>

        <p
          style="
            color: var(--ink-mute);
            font-size: 1.1rem;
            max-width: 600px;
            margin:
              18px auto 0;
          "
        >

          Thank you for your purchase.
          Your order has been confirmed
          successfully and is now being processed.

        </p>

        <div
          class="filter-card mt-5"
        >

          <div
            class="d-flex flex-wrap justify-content-between gap-4 text-start"
          >

            <div>

              <div
                style="
                  color: var(--ink-mute);
                  font-size: .78rem;
                  letter-spacing: .12em;
                  text-transform: uppercase;
                "
              >

                Order ID

              </div>

              <strong
                id="orderId"
                data-testid="order-id"
              >

                VOL-XXXXXX

              </strong>

            </div>

            <div>

              <div
                style="
                  color: var(--ink-mute);
                  font-size: .78rem;
                  letter-spacing: .12em;
                  text-transform: uppercase;
                "
              >

                Estimated Delivery

              </div>

              <strong id="eta"></strong>

            </div>

            <div>

              <div
                style="
                  color: var(--ink-mute);
                  font-size: .78rem;
                  letter-spacing: .12em;
                  text-transform: uppercase;
                "
              >

                Status

              </div>

              <strong
                style="
                  color: var(--lime);
                "
              >

                Confirmed

              </strong>

            </div>

          </div>

        </div>

        <div
          class="d-flex justify-content-center flex-wrap gap-3 mt-5"
        >

          <a
            href="shop.html"
            class="btn-neon"
          >

            <i class="bi bi-bag me-2"></i>

            Continue Shopping

          </a>

          <a
            href="home.html"
            class="btn-ghost"
          >

            Back to Home

          </a>

        </div>

      </div>

    </div>

  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/data.js"></script>

  <script src="js/main.js"></script>

  <script>
    const params =
      new URLSearchParams(
        location.search
      );

    const orderId =
      params.get("id") ||
      "VOL-DEMO";

    document
      .getElementById(
        "orderId"
      )
      .textContent = orderId;

    const eta =
      new Date();

    eta.setDate(
      eta.getDate() + 4
    );

    document
      .getElementById(
        "eta"
      )
      .textContent =
        eta.toLocaleDateString(
          "en-US",
          {
            month: "short",
            day: "numeric",
            year: "numeric"
          }
        );
  </script>

</body>
</html>
