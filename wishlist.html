<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <title>
    Wishlist — VOLTIQ
  </title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <div id="navbar"></div>

  <section class="page-head">

    <div class="container-xxl">

      <div class="crumb">

        <a href="home.html">
          Home
        </a>

        <span class="sep">
          /
        </span>

        Wishlist

      </div>

      <h1>
        Your Wishlist
      </h1>

      <p
        style="
          color: var(--ink-mute);
          max-width: 700px;
        "
      >

        Save your favorite gadgets
        and premium electronics
        for later purchase.

      </p>

    </div>

  </section>

  <section class="section">

    <div class="container-xxl">

      <div
        class="row g-4"
        id="wishlistGrid"
      ></div>

      <div
        id="wishlistEmpty"
        class="empty"
        style="display:none;"
      >

        <i class="bi bi-heart"></i>

        <h3>
          Your wishlist is empty
        </h3>

        <p
          style="
            color: var(--ink-mute);
          "
        >

          Add products to your wishlist
          to save them for later.

        </p>

        <a
          href="shop.html"
          class="btn-neon mt-3"
        >

          Explore Products

        </a>

      </div>

    </div>

  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="data.js"></script>

  <script src="main.js"></script>

  <script>
    function renderWishlist() {

      const grid =
        document.getElementById(
          "wishlistGrid"
        );

      const empty =
        document.getElementById(
          "wishlistEmpty"
        );

      const wishlist =
        getWish();

      const products =
        PRODUCTS.filter(product =>
          wishlist.includes(
            product.id
          )
        );

      if (!products.length) {

        grid.innerHTML = "";

        empty.style.display =
          "block";

        return;
      }

      empty.style.display =
        "none";

      grid.innerHTML =
        products.map(product => `

          <div class="col-lg-3 col-md-6">

            ${productCardHTML(product)}

          </div>

        `).join("");
    }

    document.addEventListener(
      "DOMContentLoaded",
      renderWishlist
    );
  </script>

</body>
</html>
