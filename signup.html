<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <title>
    Signup — VOLTIQ
  </title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="css/style.css"
  />
</head>

<body>

  <div id="navbar"></div>

  <section class="auth-wrap">

    <div class="container">

      <div
        class="row justify-content-center"
      >

        <div class="col-lg-5 col-md-7">

          <div class="auth-card">

            <h2 class="mb-2">

              Create Account ⚡

            </h2>

            <p class="sub">

              Join VOLTIQ and start
              exploring premium tech.

            </p>

            <div
              class="alert alert-danger d-none"
              id="errMsg"
            ></div>

            <form
              id="signupForm"
              autocomplete="off"
            >

              <div class="field">

                <label>
                  Full Name
                </label>

                <input
                  type="text"
                  id="sName"
                  required
                  data-testid="signup-name"
                />

              </div>

              <div class="field">

                <label>
                  Email
                </label>

                <input
                  type="email"
                  id="sEmail"
                  required
                  data-testid="signup-email"
                />

              </div>

              <div class="field">

                <label>
                  Password
                </label>

                <input
                  type="password"
                  id="sPass"
                  minlength="6"
                  required
                  data-testid="signup-password"
                />

              </div>

              <button
                type="submit"
                class="btn-neon w-100"
                data-testid="signup-submit"
              >

                <i class="bi bi-person-plus me-2"></i>

                Create Account

              </button>

            </form>

            <div
              class="text-center mt-4"
              style="
                color: var(--ink-mute);
              "
            >

              Already have an account?

              <a
                href="login.html"
                data-testid="goto-login"
                style="
                  color: var(--neon);
                "
              >

                Sign in

              </a>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/data.js"></script>

  <script src="js/main.js"></script>

  <script>
    const form =
      document.getElementById(
        "signupForm"
      );

    const errMsg =
      document.getElementById(
        "errMsg"
      );

    form.addEventListener(
      "submit",
      event => {

        event.preventDefault();

        const name =
          document
            .getElementById(
              "sName"
            )
            .value
            .trim();

        const email =
          document
            .getElementById(
              "sEmail"
            )
            .value
            .trim();

        const password =
          document
            .getElementById(
              "sPass"
            )
            .value;

        const result =
          signup(
            name,
            email,
            password
          );

        if (!result.ok) {

          errMsg.textContent =
            result.msg;

          errMsg.classList.remove(
            "d-none"
          );

          return;
        }

        errMsg.classList.add(
          "d-none"
        );

        toast(
          "Account created successfully ⚡"
        );

        setTimeout(() => {

          location.href =
            "/home.html";

        }, 700);
      }
    );
  </script>

</body>
</html>
