<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <title>
    Shop — VOLTIQ
  </title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="css/style.css"
  />
</head>

<body>

  <div id="navbar"></div>

  <section class="page-head">

    <div class="container-xxl">

      <div class="crumb">

        <a href="home.html">
          Home
        </a>

        <span class="sep">
          /
        </span>

        Shop

      </div>

      <h1 id="pageTitle">
        Explore Products
      </h1>

      <p
        id="pageSubtitle"
        style="
          color: var(--ink-mute);
          max-width: 700px;
        "
      >

        Browse premium gadgets,
        electronics, gaming gear,
        accessories, and futuristic tech.

      </p>

    </div>

  </section>

  <section class="section">

    <div class="container-xxl">

      <div class="row g-4">

        <div class="col-lg-3">

          <div class="filter-card">

            <div
              class="d-flex justify-content-between align-items-center mb-4"
            >

              <h5 class="mb-0">
                Filters
              </h5>

              <button
                class="btn-ghost"
                id="resetBtn"
                type="button"
              >

                Reset

              </button>

            </div>

            <div class="mb-4">

              <label class="mb-2">
                Search
              </label>

              <input
                type="text"
                id="pageSearch"
                placeholder="Search products..."
                class="form-control"
              />

            </div>

            <div class="mb-4">

              <label class="mb-3">
                Categories
              </label>

              <div
                id="catFilters"
                class="d-flex flex-column gap-2"
              ></div>

            </div>

            <div class="mb-4">

              <label class="mb-3">
                Brands
              </label>

              <div
                id="brandFilters"
                class="d-flex flex-column gap-2"
              ></div>

            </div>

            <div class="mb-4">

              <label class="mb-3">

                Max Price:
                <span id="priceLabel">
                  $2500
                </span>

              </label>

              <input
                type="range"
                id="priceRange"
                class="form-range"
                min="0"
                max="2500"
                step="50"
                value="2500"
              />

            </div>

            <div>

              <label class="mb-3">
                Rating
              </label>

              <div
                class="d-flex flex-column gap-2"
              >

                <div class="form-check">

                  <input
                    class="form-check-input rating-f"
                    type="radio"
                    name="rating"
                    id="r0"
                    value="0"
                    checked
                  />

                  <label
                    class="form-check-label"
                    for="r0"
                  >

                    All Ratings

                  </label>

                </div>

                <div class="form-check">

                  <input
                    class="form-check-input rating-f"
                    type="radio"
                    name="rating"
                    id="r4"
                    value="4"
                  />

                  <label
                    class="form-check-label"
                    for="r4"
                  >

                    4★ & above

                  </label>

                </div>

                <div class="form-check">

                  <input
                    class="form-check-input rating-f"
                    type="radio"
                    name="rating"
                    id="r45"
                    value="4.5"
                  />

                  <label
                    class="form-check-label"
                    for="r45"
                  >

                    4.5★ & above

                  </label>

                </div>

              </div>

            </div>

          </div>

        </div>

        <div class="col-lg-9">

          <div
            class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4"
          >

            <div>

              <strong
                id="resultCount"
              >
                0
              </strong>

              products found

            </div>

            <div
              class="d-flex align-items-center gap-2"
            >

              <label
                for="sortBy"
                class="mb-0"
              >

                Sort by

              </label>

              <select
                id="sortBy"
                class="form-select"
                style="width: 220px;"
              >

                <option value="featured">
                  Featured
                </option>

                <option value="lh">
                  Price: Low to High
                </option>

                <option value="hl">
                  Price: High to Low
                </option>

                <option value="rating">
                  Highest Rated
                </option>

                <option value="new">
                  New Arrivals
                </option>

              </select>

            </div>

          </div>

          <div
            class="row g-4"
            id="productGrid"
          ></div>

          <div
            id="emptyState"
            class="empty"
            style="display:none;"
          >

            <i class="bi bi-search"></i>

            <h3>
              No products found
            </h3>

            <p
              style="
                color: var(--ink-mute);
              "
            >

              Try adjusting your filters
              or search query.

            </p>

          </div>

        </div>

      </div>

    </div>

  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/data.js"></script>

  <script src="js/main.js"></script>

  <script src="js/shop.js"></script>

</body>
</html>
